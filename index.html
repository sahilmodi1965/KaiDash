<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KaiDash 🎯</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; overflow: hidden; }

    /* SCREENS */
    .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .screen.active { display: flex; }

    /* LOGIN */
    #login { gap: 20px; background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=1600&q=80') center/cover no-repeat; }
    #login h1 { font-size: 2.6rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #login p { color: #aaa; font-size: 0.95rem; }
    .name-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; width: 360px; }
    .name-btn { padding: 14px; border: 2px solid rgba(255,255,255,0.15); border-radius: 12px; background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); color: #e0e0e0; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
    .name-btn:hover { border-color: #667eea; background: rgba(102,126,234,0.2); transform: scale(1.04); }

    /* AUTH MODAL */
    #auth-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10; align-items: center; justify-content: center; }
    #auth-modal.active { display: flex; }
    #auth-box { background: #1a1a1a; border: 1px solid #333; border-radius: 16px; padding: 30px; width: 320px; text-align: center; }
    #auth-box h3 { margin-bottom: 6px; color: #e0e0e0; }
    #auth-box p { color: #888; font-size: 0.85rem; margin-bottom: 16px; }
    #auth-box input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #333; background: #111; color: #e0e0e0; font-size: 1rem; outline: none; text-align: center; }
    #auth-box input:focus { border-color: #667eea; }
    #auth-error { color: #f7768e; font-size: 0.85rem; margin-top: 8px; min-height: 20px; }
    #auth-box button { margin-top: 12px; padding: 12px 28px; border-radius: 12px; border: none; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-weight: 600; cursor: pointer; font-size: 1rem; }

    /* GAME */
    #game { gap: 20px; background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=1600&q=80') center/cover no-repeat fixed; }
    #game h2 { font-size: 1.4rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #game-info { color: #aaa; font-size: 0.9rem; }
    #timer-bar { width: 300px; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin: 4px 0; }
    #timer-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.1s linear; border-radius: 4px; }
    #click-count { font-size: 4rem; font-weight: 700; color: #fff; }
    #click-label { color: #888; font-size: 0.85rem; }
    #tap-zone { width: 260px; height: 260px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: transform 0.06s; font-size: 1.5rem; color: #fff; font-weight: 700; }
    #tap-zone:active { transform: scale(0.94); }
    #tap-zone.waiting { background: linear-gradient(135deg, #333, #444); cursor: default; }
    #tap-zone.done { background: linear-gradient(135deg, #9ece6a, #6aa34f); cursor: default; }
    #start-btn, #replay-btn { padding: 14px 32px; border-radius: 14px; border: none; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; }
    #replay-btn { display: none; }

    /* LEADERBOARD */
    #leaderboard { margin-top: 16px; width: 340px; }
    #leaderboard h3 { text-align: center; margin-bottom: 10px; color: #ccc; font-size: 1rem; }
    .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 6px; transition: all 0.3s; }
    .lb-row.gold { background: rgba(255,215,0,0.12); border: 1px solid rgba(255,215,0,0.3); }
    .lb-rank { font-weight: 700; width: 28px; }
    .lb-name { flex: 1; margin-left: 8px; }
    .lb-score { font-weight: 700; color: #667eea; }
    .lb-no-score { color: #555; font-style: italic; }

    .color-karan { color: #667eea; }
    .color-shaoibul { color: #f7768e; }
    .color-diana { color: #9ece6a; }
    .color-mehr { color: #e0af68; }
    .color-nandeesh { color: #7dcfff; }
    .color-sahil { color: #bb9af7; }

    #logout-btn { position: absolute; top: 16px; right: 20px; background: rgba(255,255,255,0.08); border: 1px solid #333; color: #aaa; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; }
    #logout-btn:hover { border-color: #f7768e; color: #f7768e; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login" class="screen active">
    <h1>KaiDash 🎯</h1>
    <p>Pick your name to play</p>
    <div class="name-grid">
      <button class="name-btn" onclick="tryLogin('Karan')">Karan</button>
      <button class="name-btn" onclick="tryLogin('Shaoibul')">Shaoibul</button>
      <button class="name-btn" onclick="tryLogin('Diana')">Diana</button>
      <button class="name-btn" onclick="tryLogin('Mehr')">Mehr</button>
      <button class="name-btn" onclick="tryLogin('Nandeesh')">Nandeesh</button>
      <button class="name-btn" onclick="tryLogin('Sahil')">Sahil</button>
    </div>
    <p style="margin-top:20px; font-size:0.8rem; color:#666;">Built with ❤️ by StepAhead Academy</p>
  </div>

  <!-- AUTH MODAL -->
  <div id="auth-modal">
    <div id="auth-box" class="fade-in">
      <h3 id="auth-title">Verify yourself</h3>
      <p>What's your last name?</p>
      <input type="text" id="auth-input" placeholder="Last name..." autocomplete="off" />
      <div id="auth-error"></div>
      <button onclick="verifyAuth()">Enter</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game" class="screen">
    <button id="logout-btn" onclick="logout()">← Switch player</button>
    <h2>KaiDash 🎯</h2>
    <p id="game-info">Click the circle as fast as you can in 10 seconds!</p>
    <div id="timer-bar"><div id="timer-fill"></div></div>
    <div id="click-count">0</div>
    <div id="click-label">clicks</div>
    <div id="tap-zone" class="waiting" onclick="handleTap()">TAP!</div>
    <button id="start-btn" onclick="startGame()">Start Game</button>
    <button id="replay-btn" onclick="resetGame()">Play Again</button>
    <div id="leaderboard">
      <h3>🏆 Leaderboard</h3>
      <div id="lb-rows"></div>
    </div>
  </div>

  <script>
    const MEMBERS = ['Karan', 'Shaoibul', 'Diana', 'Mehr', 'Nandeesh', 'Sahil'];
    const COLORS = { Karan:'color-karan', Shaoibul:'color-shaoibul', Diana:'color-diana', Mehr:'color-mehr', Nandeesh:'color-nandeesh', Sahil:'color-sahil' };
    const SECRETS = {
      Karan: 'sharma',
      Shaoibul: 'hoque',
      Diana: 'fernandes',
      Mehr: 'patni',
      Nandeesh: 'kumar',
      Sahil: 'modi'
    };
    const MEDALS = ['🥇', '🥈', '🥉', '4.', '5.', '6.'];

    let currentUser = '';
    let clickCount = 0;
    let gameActive = false;
    let gameTimer = null;
    let timeLeft = 10;

    // Scores stored in localStorage so they persist across refreshes
    function getScores() {
      try { return JSON.parse(localStorage.getItem('kaidash_scores') || '{}'); } catch { return {}; }
    }
    function saveScore(name, score) {
      const scores = getScores();
      if (!scores[name] || score > scores[name]) scores[name] = score;
      localStorage.setItem('kaidash_scores', JSON.stringify(scores));
    }

    // LOGIN + AUTH
    let pendingUser = '';
    function tryLogin(name) {
      pendingUser = name;
      document.getElementById('auth-title').textContent = 'Hey ' + name + '!';
      document.getElementById('auth-input').value = '';
      document.getElementById('auth-error').textContent = '';
      document.getElementById('auth-modal').classList.add('active');
      setTimeout(() => document.getElementById('auth-input').focus(), 100);
    }

    document.getElementById('auth-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') verifyAuth();
    });

    function verifyAuth() {
      const input = document.getElementById('auth-input').value.trim().toLowerCase();
      if (input === SECRETS[pendingUser]) {
        currentUser = pendingUser;
        document.getElementById('auth-modal').classList.remove('active');
        showScreen('game');
        resetGame();
      } else {
        document.getElementById('auth-error').textContent = 'Wrong last name. Try again!';
        document.getElementById('auth-input').value = '';
        document.getElementById('auth-input').focus();
      }
    }

    function logout() {
      currentUser = '';
      gameActive = false;
      clearInterval(gameTimer);
      showScreen('login');
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // GAME
    function startGame() {
      clickCount = 0;
      timeLeft = 10;
      gameActive = true;
      document.getElementById('click-count').textContent = '0';
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('replay-btn').style.display = 'none';
      document.getElementById('tap-zone').classList.remove('waiting', 'done');
      document.getElementById('tap-zone').textContent = 'TAP!';
      document.getElementById('timer-fill').style.width = '100%';
      document.getElementById('game-info').textContent = 'GO GO GO! 🔥';

      gameTimer = setInterval(() => {
        timeLeft -= 0.1;
        document.getElementById('timer-fill').style.width = Math.max(0, (timeLeft / 10) * 100) + '%';
        if (timeLeft <= 0) {
          endGame();
        }
      }, 100);
    }

    function handleTap() {
      if (!gameActive) return;
      clickCount++;
      document.getElementById('click-count').textContent = clickCount;
      document.getElementById('tap-zone').style.transform = 'scale(0.92)';
      setTimeout(() => document.getElementById('tap-zone').style.transform = '', 60);
    }

    function endGame() {
      gameActive = false;
      clearInterval(gameTimer);
      document.getElementById('timer-fill').style.width = '0%';
      document.getElementById('tap-zone').classList.add('done');
      document.getElementById('tap-zone').textContent = '✅ ' + clickCount;
      document.getElementById('game-info').textContent = currentUser + ' scored ' + clickCount + ' clicks!';
      document.getElementById('replay-btn').style.display = 'inline-block';

      saveScore(currentUser, clickCount);
      renderLeaderboard();
    }

    function resetGame() {
      clickCount = 0;
      gameActive = false;
      document.getElementById('click-count').textContent = '0';
      document.getElementById('tap-zone').classList.add('waiting');
      document.getElementById('tap-zone').classList.remove('done');
      document.getElementById('tap-zone').textContent = 'TAP!';
      document.getElementById('timer-fill').style.width = '100%';
      document.getElementById('start-btn').style.display = 'inline-block';
      document.getElementById('replay-btn').style.display = 'none';
      document.getElementById('game-info').textContent = 'Click the circle as fast as you can in 10 seconds!';
      renderLeaderboard();
    }

    function renderLeaderboard() {
      const scores = getScores();
      const sorted = MEMBERS.map(m => ({ name: m, score: scores[m] || null }))
        .sort((a, b) => (b.score || 0) - (a.score || 0));

      const html = sorted.map((p, i) => {
        const isGold = i === 0 && p.score;
        return '<div class="lb-row' + (isGold ? ' gold' : '') + ' fade-in">' +
          '<span class="lb-rank">' + MEDALS[i] + '</span>' +
          '<span class="lb-name ' + (COLORS[p.name] || '') + '">' + p.name + '</span>' +
          (p.score ? '<span class="lb-score">' + p.score + ' clicks</span>' : '<span class="lb-no-score">—</span>') +
          '</div>';
      }).join('');

      document.getElementById('lb-rows').innerHTML = html;
    }
  </script>
</body>
</html>
