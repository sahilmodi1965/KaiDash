<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KaiDash 💬</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    #login { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
    #login h1 { font-size: 2.4rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #login p { color: #888; font-size: 0.95rem; }
    .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 280px; }
    .name-btn { padding: 14px; border: 2px solid #333; border-radius: 12px; background: #1a1a1a; color: #e0e0e0; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
    .name-btn:hover { border-color: #667eea; background: #1f1f2e; transform: scale(1.04); }

    #chat { display: none; flex-direction: column; height: 100vh; }
    #chat-header { padding: 16px 20px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
    #chat-header h2 { font-size: 1.1rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #chat-header span { color: #888; font-size: 0.85rem; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 0.95rem; line-height: 1.4; animation: fadeIn 0.2s ease; }
    .msg .author { font-size: 0.75rem; font-weight: 600; margin-bottom: 2px; }
    .msg.mine { align-self: flex-end; background: #667eea; color: #fff; border-bottom-right-radius: 4px; }
    .msg.mine .author { display: none; }
    .msg.theirs { align-self: flex-start; background: #1e1e2e; border-bottom-left-radius: 4px; }
    .msg.system { align-self: center; background: none; color: #555; font-size: 0.8rem; padding: 4px; }
    .color-karan { color: #667eea; }
    .color-shaoibul { color: #f7768e; }
    .color-diana { color: #9ece6a; }
    .color-mehr { color: #e0af68; }

    #input-bar { padding: 12px 16px; background: #1a1a1a; border-top: 1px solid #2a2a2a; display: flex; gap: 10px; }
    #input-bar input { flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid #333; background: #111; color: #e0e0e0; font-size: 1rem; outline: none; }
    #input-bar input:focus { border-color: #667eea; }
    #input-bar button { padding: 12px 20px; border-radius: 24px; border: none; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-weight: 600; cursor: pointer; }
    #input-bar button:hover { opacity: 0.9; }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    #online-bar { display: flex; gap: 10px; padding: 8px 20px; background: #141414; border-bottom: 1px solid #1e1e1e; }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; display: inline-block; margin-right: 4px; vertical-align: middle; }
    .online-dot.active { background: #9ece6a; }
    .online-name { font-size: 0.78rem; color: #666; }
    .online-name.active { color: #ccc; }
  </style>
</head>
<body>

  <div id="login">
    <h1>KaiDash 💬</h1>
    <p>Pick your name to join the chat</p>
    <div class="name-grid">
      <button class="name-btn" onclick="joinChat('Karan')">Karan</button>
      <button class="name-btn" onclick="joinChat('Shaoibul')">Shaoibul</button>
      <button class="name-btn" onclick="joinChat('Diana')">Diana</button>
      <button class="name-btn" onclick="joinChat('Mehr')">Mehr</button>
    </div>
    <p style="margin-top:20px; font-size:0.8rem; color:#555;">Built with ❤️ by StepAhead Academy</p>
  </div>

  <div id="chat">
    <div id="chat-header">
      <h2>KaiDash 💬</h2>
      <span id="user-label"></span>
    </div>
    <div id="online-bar"></div>
    <div id="messages"></div>
    <div id="input-bar">
      <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const MEMBERS = ['Karan', 'Shaoibul', 'Diana', 'Mehr'];
    const colors = { Karan: 'color-karan', Shaoibul: 'color-shaoibul', Diana: 'color-diana', Mehr: 'color-mehr' };
    let currentUser = '';

    // Demo greetings the "bots" will send
    const demoReplies = {
      Karan:    ["Yo! What's up team 🔥", "Let's gooo", "Haha nice one"],
      Shaoibul: ["Salam everyone ✌️", "Sounds good!", "I'm in"],
      Diana:    ["Hey hey! 👋", "Love that idea", "Totally agree"],
      Mehr:     ["Hi all! 😊", "Cool cool", "Let's do it!"]
    };

    function joinChat(name) {
      currentUser = name;
      document.getElementById('login').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      document.getElementById('user-label').textContent = 'Logged in as ' + name;

      renderOnlineBar();
      renderMessage({ user: 'system', text: name + ' joined the chat' });

      // Simulate others joining after a delay
      const others = MEMBERS.filter(m => m !== name);
      others.forEach((m, i) => {
        setTimeout(() => {
          renderMessage({ user: 'system', text: m + ' joined the chat' });
          markOnline(m);
        }, 1000 + i * 800);
      });

      // Others say hello
      others.forEach((m, i) => {
        setTimeout(() => {
          renderMessage({ user: m, text: demoReplies[m][0] });
        }, 3000 + i * 1200);
      });

      document.getElementById('msg-input').focus();
    }

    function renderOnlineBar() {
      const bar = document.getElementById('online-bar');
      bar.innerHTML = MEMBERS.map(m =>
        '<span class="online-name" id="online-' + m + '">' +
        '<span class="online-dot' + (m === currentUser ? ' active' : '') + '" id="dot-' + m + '"></span>' +
        m + '</span>'
      ).join('');
    }

    function markOnline(name) {
      const dot = document.getElementById('dot-' + name);
      const label = document.getElementById('online-' + name);
      if (dot) dot.classList.add('active');
      if (label) label.classList.add('active');
    }

    function renderMessage(m) {
      const div = document.createElement('div');
      if (m.user === 'system') {
        div.className = 'msg system';
        div.textContent = m.text;
      } else {
        const isMine = m.user === currentUser;
        div.className = 'msg ' + (isMine ? 'mine' : 'theirs');
        div.innerHTML = '<div class="author ' + (colors[m.user] || '') + '">' + m.user + '</div>' + escapeHtml(m.text);
      }
      const container = document.getElementById('messages');
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;
      renderMessage({ user: currentUser, text: text });
      input.value = '';
      input.focus();

      // Random team member replies after a short delay
      const others = MEMBERS.filter(m => m !== currentUser);
      const responder = others[Math.floor(Math.random() * others.length)];
      const pool = demoReplies[responder];
      const reply = pool[Math.floor(Math.random() * pool.length)];
      setTimeout(() => renderMessage({ user: responder, text: reply }), 800 + Math.random() * 1500);
    }

    document.getElementById('msg-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }
  </script>
</body>
</html>
